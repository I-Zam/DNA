<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA - Inventario de Consignación</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>🎁 DNA - Inventario</h1>
                <p class="subtitle">Sistema de Consignación</p>
            </div>
            <div class="header-actions">
                <button onclick="exportToCSV()" class="btn btn-primary">📥 Export CSV</button>
                <button onclick="loadProductsFromSheets()" class="btn btn-secondary">🔄 Refresh</button>
            </div>
        </header>

        <!-- Controls -->
        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Buscar producto..." onkeyup="filterProducts()">
            </div>
            <select id="categoryFilter" class="category-filter" onchange="filterProducts()">
                <option value="">-- Todas --</option>
            </select>
            <div class="product-count" id="productCount">0 productos</div>
        </div>

        <!-- Product Grid -->
        <section class="products-section">
            <div class="product-grid" id="productGrid">
                <div class="loading">Cargando productos...</div>
            </div>
        </section>

        <!-- Daily Summary -->
        <section class="summary-section">
            <div class="summary-card">
                <h3>Total Vendido</h3>
                <p class="summary-value" id="totalSale">$0.00</p>
            </div>
            <div class="summary-card">
                <h3>Unidades Vendidas</h3>
                <p class="summary-value" id="totalQuantity">0</p>
            </div>
        </section>

        <!-- Sales Table -->
        <section class="sales-section">
            <div class="sales-header">
                <h2>📊 Ventas de Hoy</h2>
                <button onclick="location.reload()" class="btn btn-danger">🗑️ Limpiar</button>
            </div>
            <table class="sales-table">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Cantidad</th>
                        <th>Precio</th>
                        <th>Total</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="salesTableBody">
                    <tr>
                        <td colspan="5" class="no-data">No hay ventas registradas</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn btn-secondary" onclick="hacerCorte()">📋 Hacer Corte</button>
            <button class="btn btn-secondary" onclick="verHistorico()">📊 Ver Histórico</button>
        </div>
    </div>

    <!-- Sale Recording Modal -->
    <div class="modal" id="saleModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Registrar Venta</h2>
            <div class="modal-body">
                <div class="form-group">
                    <label>Producto:</label>
                    <p id="modalProductName" class="modal-product-name">Producto</p>
                </div>
                <div class="form-group">
                    <label>Categoría:</label>
                    <p id="modalProductCategory" class="modal-product-category">Categoría</p>
                </div>
                <div class="form-group">
                    <label>Precio Unitario:</label>
                    <p id="modalProductPrice" class="modal-product-price">$0</p>
                </div>
                <div class="form-group">
                    <label>Stock Disponible:</label>
                    <p id="modalProductStock" class="modal-product-stock">0 unidades</p>
                </div>
                <div class="form-group">
                    <label for="saleQuantity">Cantidad:</label>
                    <input type="number" id="saleQuantity" min="1" value="1">
                </div>
                <div class="form-group calculation">
                    <div class="calc-row">
                        <span>Total Venta:</span>
                        <span id="calcTotalSale">$0.00</span>
                    </div>
                </div>
            </div>
            <div class="modal-actions">
                <button onclick="closeModal()" class="btn btn-secondary">Cancelar</button>
                <button onclick="recordSale()" class="btn btn-primary">Registrar Venta</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Real-time calculation in modal
        document.getElementById('saleQuantity').addEventListener('input', function() {
            const quantity = parseInt(this.value) || 0;
            const priceText = document.getElementById('modalProductPrice').textContent;
            const price = parseInt(priceText.replace('$', '')) || 0;
            
            const totalSale = price * quantity;
            
            document.getElementById('calcTotalSale').textContent = `$${totalSale}`;
        });
    </script>
</body>
</html>
